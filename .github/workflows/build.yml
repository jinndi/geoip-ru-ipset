name: Build RU Clean GeoIP

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install sing-box
        run: |
          VERSION=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest | grep "tag_name" | cut -d '"' -f 4)
          VERSION=${VERSION#v}
          wget https://github.com/SagerNet/sing-box/releases/download/v$VERSION/sing-box-$VERSION-linux-amd64.tar.gz
          tar -xzf sing-box-$VERSION-linux-amd64.tar.gz
          sudo mv sing-box*/sing-box /usr/local/bin/
          chmod +x /usr/local/bin/sing-box

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install requests tqdm

      - name: Build GeoIP
        run: |
          python geoip_builder.py

      - name: Commit
        env:
          TZ: "Europe/Moscow"
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes to the output on this push; exiting."
            exit 0
          fi

          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "[auto] $(date '+%Y-%m-%d %H:%M:%S')"
          git push

          curl -sfL "https://purge.jsdelivr.net/gh/jinndi/geoip-ru@main/ru-no-blocked.srs"
          curl -sfL "https://purge.jsdelivr.net/gh/jinndi/geoip-ru@main/ru-blocked.srs"       